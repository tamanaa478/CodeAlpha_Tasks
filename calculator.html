
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Tamana Amani</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #1e1e24; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }
        .calc-container { background-color: #333; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); width: 100%; max-width: 320px; margin: 15px; }
        h2 { text-align: center; margin-bottom: 15px; color: #00ffcc; font-size: 20px; }
        #display { width: 100%; height: 60px; background-color: #222; border: none; border-radius: 10px; margin-bottom: 20px; color: #fff; text-align: right; padding: 15px; font-size: 28px; font-weight: bold; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        button { padding: 18px; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; background-color: #444; color: #fff; transition: background 0.2s; }
        button:active { background-color: #555; }
        button.operator { background-color: #ff9f0a; color: #fff; }
        button.operator:active { background-color: #cc7f08; }
        button.clear { background-color: #a5a5a5; color: #000; }
        button.clear:active { background-color: #8e8e8e; }
        button.equal { grid-column: span 2; background-color: #00ffcc; color: #000; }
        button.equal:active { background-color: #00ccaa; }
    </style>
</head>
<body>

    <div class="calc-container">
        <h2>Tamana's Calc</h2>
        <input type="text" id="display" readonly placeholder="0">
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="appendValue('/')">/</button>
            <button onclick="appendValue('*')">×</button>
            <button onclick="appendValue('-')">-</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="backspace()">⌫</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="equal" onclick="calculate()">=</button>
            
            <button style="grid-column: span 2;" onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        function appendValue(val) { if (display.value === '0') display.value = ''; display.value += val; }
        function clearDisplay() { display.value = ''; }
        function backspace() { display.value = display.value.slice(0, -1); }
        function calculate() { try { if(display.value) display.value = eval(display.value); } catch(err) { display.value = 'Error'; } }
    </script>
</body>
</html>
